name: Perform Unit Tests On Backend System

on:
  pull_request:
    paths:
    # - '' Add path to backend unit tests here
      - '.github/workflows/backend-unit-tests.yml'
  push:
    branches:
      - main
    paths:
      # - '' Add path to backend unit tests here
      - '.github/workflows/backend-unit-tests.yml'
      
jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          
      - name: Make mvnw Excecutable
        working-directory: backend-server
        run: chmod +x ./mvnw

      - name: Run Maven Tests
        working-directory: backend-server
        continue-on-error: true
        run: ./mvnw -B test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            backend-server/target/surefire-reports/

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: |
            backend-server/target/surefire-reports/TEST-*.xml
